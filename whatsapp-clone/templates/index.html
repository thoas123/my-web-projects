<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#075e54">
    <meta name="description" content="WhatsApp Clone - Real-time chat app">
    <link rel="manifest" href="/static/manifest.json">
    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">
    <title>WhatsApp Clone</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>WhatsApp Clone</h1>
        <div id="login" class="login">
            <input type="text" id="username" placeholder="Enter username" />
            <button onclick="login()">Login</button>
        </div>
        <div id="chat" class="chat" style="display: none;">
            <div class="chat-header">
                <h2>Global Chat</h2>
                <button id="toggleUsers" class="toggle-btn">👥</button>
            </div>
            <div class="chat-body">
                <div class="messages" id="messages"></div>
                <div class="user-list" id="userList" style="display: none;"></div>
            </div>
            <div class="input-area">
                <input type="text" id="message" placeholder="Type a message..." />
                <button onclick="sendMessage()">Send</button>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.js"></script>
    <script src="{{ url_for('static', filename='app.js') }}"></script>
    <script src="{{ url_for('static', filename='pwa.js') }}"></script>
</body>
</html>
